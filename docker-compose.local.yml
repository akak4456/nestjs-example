# docker-compose.local.yml
services:
  postgres:
    image: postgres:16
    container_name: nestjs-local-postgres
    ports:
      - '5434:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nestjs_local
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
